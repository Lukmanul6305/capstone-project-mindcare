tags:
  - name: Users
    description: Manajemen data user

paths:
  /users/me:
    get:
      tags: [Users]
      summary: Ambil profil user yang sedang login
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Berhasil
        "401":
          description: Unauthorized

    put:
      tags: [Users]
      summary: Update profil user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe Updated
      responses:
        "200":
          description: Berhasil diupdate
        "401":
          description: Unauthorized