tags:
  - name: Stress Scan
    description: Pemindaian tingkat stres user

paths:
  /stress-scan:
    post:
      tags: [Stress Scan]
      summary: Scan tingkat stres user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jawaban:
                  type: array
                  items:
                    type: integer
                  example: [3, 2, 4, 1, 3]
      responses:
        "201":
          description: Berhasil
        "401":
          description: Unauthorized

    get:
      tags: [Stress Scan]
      summary: Ambil riwayat stress scan user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Berhasil
        "401":
          description: Unauthorized